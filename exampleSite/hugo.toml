# Configuração básica
baseURL = "https://example.com"
theme = "hugo-bearcub"
copyright = "othiagob (CC BY 4.0)"
defaultContentLanguage = "pt"

# Gera robots.txt para SEO
enableRobotsTXT = true

# Configuração de realce de sintaxe sem estilos inline
[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[languages]
  [languages.pt]
    title = "br.com.othiagob.blog"
    languageName = "pt-BR 🇧🇷"
    LanguageCode = "pt-BR"
    contentDir = "content.pt"
    [languages.pt.params]
      madeWith = "Feito com [Bear Cub](https://github.com/clente/hugo-bearcub)"
    [languages.pt.menu]
      [[languages.pt.menu.main]]
        name = "Início"
        pageRef = "/"
        weight = 1
      [[languages.pt.menu.main]]
        name = "Blog"
        pageRef = "/blog"
        weight = 2
      [[languages.pt.menu.main]]
        name = "Projetos"
        pageRef = "/projetos"
        weight = 3

[params]
  description = "thiago"
  favicon = "images/favicon.png"
  images = ["images/favicon.png"]
  title = "br.com.othiagob.blog"
  dateFormat = "02/01/2006"
  hideUntranslated = false
  themeStyle = "original"
  fontFamily = "softUI"
  fontFamilyAlt = "humanistUI"
  generateSocialCard = false

  [params.fontFamilies]
    softUI = '"Segoe UI Variable Text", "Segoe UI", "Segoe UI Symbol", "Segoe UI Emoji", "Noto Sans", sans-serif'
    humanistUI = '"Segoe UI Variable Text", "Segoe UI", "Candara", "Optima", "Trebuchet MS", sans-serif'

  [params.author]
    name = "thiago"
    email = ""
