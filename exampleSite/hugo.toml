# Configuração básica
baseURL = "https://othiagob.github.io/blog/"
theme = "hugo-bearcub"
copyright = "othiagob (CC BY 4.0)"
defaultContentLanguage = "pt"

# Gera robots.txt para SEO
enableRobotsTXT = true

# Configuração de realce de sintaxe sem estilos inline
[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[languages]
  [languages.pt]
    title = "OTHIAGOB"
    languageName = "pt-BR 🇧🇷"
    LanguageCode = "pt-BR"
    contentDir = "content.pt"
    [languages.pt.params]
      madeWith = "Feito com [Bear Cub](https://github.com/clente/hugo-bearcub)"
    [languages.pt.menu]
      [[languages.pt.menu.main]]
        name = "Início"
        pageRef = "/"
        weight = 1
      [[languages.pt.menu.main]]
        name = "Blog"
        pageRef = "/blog"
        weight = 2
      [[languages.pt.menu.main]]
        name = "Projetos"
        pageRef = "/projetos"
        weight = 3
      [[languages.pt.menu.main]]
        name = "Sobre"
        pageRef = "/sobre"
        weight = 4
      [[languages.pt.menu.main]]
        name = "Contato"
        pageRef = "/contato"
        weight = 5

[params]
  description = "Blog e portfólio de OTHIAGOB — Java, Ciência da Computação e projetos." 
  favicon = "images/favicon.png"
  images = ["images/favicon.png"]
  title = "OTHIAGOB"
  dateFormat = "02/01/2006"
  hideUntranslated = false
  themeStyle = "original"
  fontFamily = "softUI"
  fontFamilyAlt = "humanistUI"
  generateSocialCard = true
  # SEO defaults
  keywords = ["Java","Ciência da Computação","Projetos","Portfólio","Blog"]
  descriptionShort = "Portfólio e blog técnico de OTHIAGOB — Java, CS e projetos." 
  canonical = "https://othiagob.github.io/blog/"

  [params.social]
    github = "https://github.com/othiagob"
    twitter = ""
    linkedin = ""

  [params.seo]
    enable = true
    twitterCard = "summary_large_image"
    siteName = "OTHIAGOB"

  [params.fontFamilies]
    softUI = '"Segoe UI Variable Text", "Segoe UI", "Segoe UI Symbol", "Segoe UI Emoji", "Noto Sans", sans-serif'
    humanistUI = '"Segoe UI Variable Text", "Segoe UI", "Candara", "Optima", "Trebuchet MS", sans-serif'

  [params.author]
    name = "OTHIAGOB"
    email = ""

[outputs]
  home = ["HTML","RSS","JSON"]

[sitemap]
  changefreq = "monthly"
  priority = 0.7
  filename = "sitemap.xml"
